baseURL       = "https://feidashen1.github.io/"
locale        = "zh-cn"
title         = "Feidashen 的博客"
theme         = "stack"
hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts   = false
buildFuture   = false
buildExpired  = false

[pagination]
  pagerSize = 10

[permalinks]
  page = "/:slug/"
# post 不设自定义 permalinks，保持默认 /posts/slug/ 路径，避免破坏已有链接

# ─── 代码高亮 ───────────────────────────────
[markup.highlight]
  noClasses          = false
  codeFences         = true
  guessSyntax        = true
  lineNos            = false
  lineNumbersInTable = false

# ─── Goldmark 数学公式 passthrough ──────────
[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block  = [["\\[", "\\]"], ["$$", "$$"]]
    inline = [["\\(", "\\)"], ["$", "$"]]

[markup.goldmark.renderer]
  unsafe = true

# ─── 目录 ───────────────────────────────────
[tableOfContents]
  endLevel   = 4
  ordered    = false
  startLevel = 2

# ─── 压缩 ───────────────────────────────────
[minify]
  disableXML = true
  minifyOutput = true

# ─── 输出格式 ───────────────────────────────
[outputs]
  home = ["HTML", "RSS"]

# ─── Google Analytics（仅生产环境注入）──────
[services.googleAnalytics]
  ID = "G-0DHLKH8LTF"

# ─── 顶部导航菜单 ───────────────────────────
[menu]
  [[menu.main]]
    identifier = "posts"
    name       = "文章"
    url        = "/posts/"
    weight     = 10
  [[menu.main]]
    identifier = "about"
    name       = "关于"
    url        = "/about/"
    weight     = 50

# ═══════════════════════════════════════════
# Stack 主题参数
# ═══════════════════════════════════════════
[params]
  mainSections      = ["posts"]
  featuredImageField = "image"
  rssFullContent    = true
  favicon           = "/favicon.svg"

  [params.footer]
    since      = 2026
    customText = ""

  [params.dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.sidebar]
    emoji    = "📝"
    subtitle = "记录技术与生活"
    avatar   = ""
    compact  = false

  [params.article]
    headingAnchor = true
    math          = false
    toc           = true
    readingTime   = true

    [params.article.list]
      showTags = true

    [params.article.license]
      enabled = false

    [params.article.mermaid]
      look                  = "classic"
      lightTheme            = "default"
      darkTheme             = "dark"
      securityLevel         = "strict"
      htmlLabels            = true
      transparentBackground = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

  [params.opengraph.twitter]
    site = ""
    card = "summary_large_image"

  [params.colorScheme]
    toggle  = true
    default = "auto"

  [params.imageProcessing]
    autoOrient = false
    [params.imageProcessing.content]
      widths  = [800, 1600]
      enabled = true
    [params.imageProcessing.thumbnail]
      enabled = true

  # ─── Giscus 评论 ────────────────────────
  [params.comments]
    enabled  = true
    provider = "giscus"

    [params.comments.giscus]
      repo             = "Feidashen1/Feidashen1.github.io"
      repoID           = "R_kgDOSukKjg"
      category         = "Announcements"
      categoryID       = "DIC_kwDOSukKjs4C-WCA"
      mapping          = "pathname"
      strict           = 0
      reactionsEnabled = 1
      emitMetadata     = 0
      inputPosition    = "bottom"
      lightTheme       = "light"
      darkTheme        = "dark_dimmed"
      lang             = "zh-CN"
      loading          = "lazy"
